name: voccaria-core

services:
  nginx:
    image: nginx:alpine
    environment:
      FRONTEND_UPSTREAM: frontend:5000
      BACKEND_UPSTREAM: backend:5000
    volumes:
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
    depends_on:
      - frontend
      - backend
    networks:
      - voccaria-network

  frontend:
    build:
      context: client/web-frontend
    networks:
      - voccaria-network

  backend:
    build:
      context: server/node-backend
    networks:
      - voccaria-network

networks:
  voccaria-network:
