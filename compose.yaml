name: voccaria-core

services:
  frontend:
    build:
      context: client/web-frontend
      dockerfile: Dockerfile.dev
    networks:
      - voccaria-network
    ports:
      - "3000:3000"
    container_name: core-frontend
    env_file:
      - .env.local
    environment:
      - PORT=3000
    depends_on:
      - backend

  backend:
    build:
      context: server/node-backend
      dockerfile: Dockerfile.dev
    networks:
      - voccaria-network
    ports:
      - "5000:5000"
    container_name: core-backend
    env_file:
      - .env.local
    environment:
      - PORT=5000
    depends_on:
      - db

  db:
    image: mongodb/mongodb-community-server:7.0-ubuntu2204
    ports:
      - "27017:27017"
    container_name: core-db-mongodb
    env_file:
      - .env.db-root-creds
      - .env.db-voccaria
    volumes:
      - type: bind
        source: ./db-config/mongo-init.js
        target: /docker-entrypoint-initdb.d/mongo-init.js
        read_only: true
      - type: volume
        source: core-db-mongodb-data
        target: /data/db
    networks:
      - voccaria-network

volumes:
  core-db-mongodb-data:

networks:
  voccaria-network:
