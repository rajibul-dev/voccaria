name: voccaria-core

services:
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - voccaria-network

  frontend:
    build:
      context: client/web-frontend
    networks:
      - voccaria-network

  backend:
    build:
      context: server/node-backend
    networks:
      - voccaria-network

networks:
  voccaria-network:
