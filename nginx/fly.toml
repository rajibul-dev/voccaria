app = "voccaria-staging-reverse-proxy"
primary_region = "bom"

[env]
  FRONTEND_UPSTREAM = "voccaria-staging-frontend.internal:5000"
  BACKEND_UPSTREAM  = "voccaria-staging-backend.internal:5000"

[http_service]
auto_start_machines = true
auto_stop_machines = true
force_https = true
internal_port = 80
min_machines_running = 0
processes = [ "app" ]

[[vm]]
cpu_kind = "shared"
cpus = 1
memory = "1gb"
memory_mb = 1_024
