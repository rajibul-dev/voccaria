app = 'voccaria-staging-reverse-proxy-billowing-smoke-8089'
primary_region = 'bom'

[build]

[env]
  BACKEND_UPSTREAM = 'voccaria-staging-backend.flycast:5000'
  FRONTEND_UPSTREAM = 'voccaria-staging-frontend.flycast:5000'

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = false
  min_machines_running = 1
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
