name: Build and Push Docker Images

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        run: echo "GIT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      # ---------- Backend ----------
      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: server/node-backend
          file: server/node-backend/Dockerfile
          push: true
          labels: |
            org.opencontainers.image.source=https://github.com/rajibul-dev/voccaria
          tags: |
            ghcr.io/rajibul-dev/voccaria-backend:latest
            ghcr.io/rajibul-dev/voccaria-backend:${{ env.GIT_SHA }}

      # ---------- Frontend ----------
      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: client/web-frontend
          file: client/web-frontend/Dockerfile
          push: true
          labels: |
            org.opencontainers.image.source=https://github.com/rajibul-dev/voccaria
          tags: |
            ghcr.io/rajibul-dev/voccaria-frontend:latest
            ghcr.io/rajibul-dev/voccaria-frontend:${{ env.GIT_SHA }}
