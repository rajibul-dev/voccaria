app = "voccaria-staging-backend"
primary_region = "bom"

[env]
PORT = "5000"
NODE_ENV = "production"

[http_service]
auto_start_machines = true
auto_stop_machines = true
force_https = true
internal_port = 5000
min_machines_running = 1
processes = [ "app" ]

[[vm]]
cpu_kind = "shared"
cpus = 1
memory_mb = 512
