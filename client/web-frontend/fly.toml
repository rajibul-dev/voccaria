# fly.toml app configuration file generated for voccaria-staging-frontend on 2025-12-27T21:21:02Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'voccaria-staging-frontend'
primary_region = 'bom'

[build]

[http_service]
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  internal_port = 5000
  force_https = false
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[build.args]
  NEXT_PUBLIC_SANITY_PROJECT_ID = "${NEXT_PUBLIC_SANITY_PROJECT_ID}"
  NEXT_PUBLIC_SANITY_DATASET = "${NEXT_PUBLIC_SANITY_DATASET}"
  SANITY_PROJECT_ID = "${NEXT_PUBLIC_SANITY_PROJECT_ID}"
  SANITY_DATASET = "${NEXT_PUBLIC_SANITY_DATASET}"
